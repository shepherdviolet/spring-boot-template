
server:
  port: 8080
  address: 0.0.0.0
  tomcat:
    ## TODO [重要]指定tomcat的basedir, 用于临时文件, 该目录需要创建. 避免运行十天出现The temporary upload location...的异常
    basedir: ./tmp
    accept-count: 200
    max-connections: 2000
    max-http-form-post-size: 10485760
    threads:
      max: 200
      min-spare: 10
